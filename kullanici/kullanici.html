<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="kullanici.css">
    <title>Kullanici Giriş Sayfası</title>
</head>

<body>

    <div class="container" id="container">
        <div class="form sign-up">
            <form>
                <h1>Hesap Oluştur</h1>
                <div class="sosyal-media-sembol">
                    <a href="#" class="sembol"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>veya kayıt için e-posta adresinizi kullanın</span>
                <input type="text" placeholder="İsim">
                <input type="email" placeholder="E-posta">
                <input type="password" placeholder="Şifre">
                <button>Kayıt Ol</button>
            </form>
        </div>
        <div class="form sign-in">
            <form>
                <h1>Giriş Yap</h1>
                <div class="sosyal-media-sembol">
                    <a href="#" class="sembol"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="sembol"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>veya e-posta adresi ve şifrenizi kullanın</span>
                <input type="email" placeholder="E-posta">
                <input type="password" placeholder="Şifre">
                <a href="#">Şifrenizi mi Unuttunuz?</a>
                <button>Giriş Yap</button>
            </form>
        </div>
        <div class="gecis-div">
            <div class="gecis">
                <div class="paneli-degis sola-degistir">
                    <h1>Tekrar Hoş Geldiniz!</h1>
                    <p>Sitenin tüm özelliklerini kullanmak için kişisel bilgilerinizi girin</p>
                    <button class="hidden" id="giris">Giriş Yap</button>
                </div>
                <div class="paneli-degis saga-degistir">
                    <h1>Merhaba!</h1>
                    <p>Sitenin tüm özelliklerini kullanmak için kayıt olun</p>
                    <button class="hidden" id="kayit-ol">Kayıt Ol</button>
                </div>
            </div>
        </div>
    </div>

    <script src="kullanici.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>Dinamik Takvim</title>
    <link rel="stylesheet" href="takvimStyle.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font Link for Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="takvim.js" defer></script>
</head>

<body>
    <!-- ana sayfa -->
    <div class="container">
        <!-- sol kismi -->
        <div class="left">
            <div class="takvim">

                <div class="month">
                    <i class="fa-solid fa-angle-left onceki"></i>
                    <div class="tarih">kasım 2024</div>
                    <i class="fa-solid fa-angle-right sonraki"></i>

                </div>
                <!-- gunler -->
                <div class="hafta-gunleri">
                    <div>Paz</div>
                    <div>Pzt</div>
                    <div>Sal</div>
                    <div>Çar</div>
                    <div>Per</div>
                    <div>Cum</div>
                    <div>Cmt</div>
                </div>
                <!-- ayda gunleri 31-29....... -->
                <div class="gunler"></div>
                <!-- aya gitmek için -->
                <div class="bugune-git">
                    <div class="git">
                        <input type="text" placeholder="aa/yyyy" class="tarih-input" />
                        <button class="git-btn">Git</button>
                    </div>
                    <button class="bugun-btn">Bugün</button>
                </div>
            </div>
        </div>
        <!-- sag kısmı-->
        <div class="right">
            <div class="bugun-tarihi">
                <div class="etkinlik-gunu">Sal</div>
                <div class="etkinlik-tarihi">12 kasım 2024</div>
            </div>
            <div class="etikinlikler"></div>
            <div class="etkinlik-ekle-kapagi">
                <div class="etkinlik-basligi-ekle">
                    <div class="title">Etkinlik Ekle</div>
                    <i class="fas fa-times kapat"></i>
                </div>
                <div class="etkinlik-ekle-body">
                    <div class="etkinlik-ekle-input">
                        <input type="text" placeholder="Etkinlik Adı" class="etkinlik-adi" />
                    </div>
                    <div class="etkinlik-ekle-input">
                        <input type="text" placeholder="Etkinlik Başlangıç Saati" class="etkinlik-zamani-baslangic" />
                    </div>
                    <div class="etkinlik-ekle-input">
                        <input type="text" placeholder="Etkinlik Bitiş Saati" class="etkinlik-zamani-bitis" />
                    </div>
                </div>
                <div class="etkinlik-ekle-footer">
                    <button class="etkinlik-ekle-btn">Kaydet</button>
                </div>
            </div>
        </div>
        <button class="etkinlik-ekle">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div class="acik-kode">
        <p>
            &copy;2024 Kod:
            <a href="https://github.com/naser127a/FinalProjectWebTasar-m" target="_blank">Açık Kaynak Kod</a>
        </p>
    </div>
</body>

</html>
